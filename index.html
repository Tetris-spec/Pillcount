<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PillCount AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; color: white; padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; opacity: 0.8; margin-bottom: 30px; }
        .count-display {
            background: rgba(0,0,0,0.3); border-radius: 20px; padding: 40px;
            text-align: center; margin-bottom: 20px;
        }
        .count-number { font-size: 6rem; font-weight: bold; }
        .count-label { opacity: 0.8; margin-top: 10px; font-size: 1.2rem; }
        .image-container { 
            background: #000; border-radius: 15px; overflow: hidden; 
            margin-bottom: 20px; min-height: 200px; display: flex;
            align-items: center; justify-content: center;
        }
        #preview { max-width: 100%; max-height: 400px; display: none; }
        .placeholder { color: #666; font-size: 1.2rem; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { 
            flex: 1; padding: 18px; font-size: 1.1rem; border: none; 
            border-radius: 12px; cursor: pointer; font-weight: 600;
        }
        .btn-capture { background: #00d9ff; color: #000; }
        .btn-count { background: #00ff88; color: #000; }
        .btn-count:disabled { background: #666; }
        #fileInput, #cameraInput { display: none; }
        .status { 
            text-align: center; padding: 15px; background: rgba(0,0,0,0.2);
            border-radius: 10px; margin-top: 10px;
        }
        .api-key-section {
            background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px;
            margin-bottom: 20px;
        }
        .api-key-section input {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            font-size: 1rem; margin-top: 10px;
        }
        .api-key-section label { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💊 PillCount AI</h1>
        <p class="subtitle">Powered by AI Vision (~$0.001/count)</p>
        
        <div class="count-display">
            <div class="count-number" id="pillCount">-</div>
            <div class="count-label">pills counted</div>
        </div>
        
        <div class="image-container">
            <img id="preview">
            <span class="placeholder" id="placeholder">📷 Take a photo of pills</span>
        </div>
        
        <div class="controls">
            <button class="btn-capture" onclick="document.getElementById('cameraInput').click()">
                📷 Camera
            </button>
            <button class="btn-capture" onclick="document.getElementById('fileInput').click()" style="background:#333;color:#fff">
                📁 Upload
            </button>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFile(event)">
        </div>
        
        <div class="api-key-section">
            <label>OpenAI API Key:</label>
            <input type="password" id="apiKey" placeholder="sk-..." value="">
            <small style="opacity:0.6; display:block; margin-top:5px;">Key is saved locally on your device</small>
        </div>
        
        <div class="controls">
            <button class="btn-count" onclick="countWithAI()" id="countBtn">
                🔢 Count with AI
            </button>
        </div>
        
        <div class="status" id="status">Take a photo and click Count</div>
    </div>

    <script>
        let imageBase64 = null;

        // Load saved API key
        const savedKey = localStorage.getItem('pillcount_api_key');
        if (savedKey) {
            document.getElementById('apiKey').value = savedKey;
        }

        // Save API key when changed
        document.getElementById('apiKey').addEventListener('change', (e) => {
            localStorage.setItem('pillcount_api_key', e.target.value);
        });

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                
                // Store base64 (remove data:image/...;base64, prefix)
                imageBase64 = e.target.result.split(',')[1];
                
                document.getElementById('status').textContent = '✅ Image ready. Click Count with AI.';
                document.getElementById('pillCount').textContent = '-';
            };
            reader.readAsDataURL(file);
        }

        async function countWithAI() {
            const apiKey = document.getElementById('apiKey').value.trim();
            
            if (!apiKey) {
                document.getElementById('status').textContent = '⚠️ Enter your OpenAI API key above';
                return;
            }
            
            if (!imageBase64) {
                document.getElementById('status').textContent = '⚠️ Take a photo first';
                return;
            }

            document.getElementById('status').textContent = '🔄 Analyzing with GPT-4 Vision...';
            document.getElementById('countBtn').disabled = true;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o',
                        messages: [{
                            role: 'user',
                            content: [
                                {
                                    type: 'text',
                                    text: 'Count the exact number of pills/tablets in this image. Be very careful and precise. Count each pill only once. Do not count shadows or reflections. Reply with ONLY the number, nothing else.'
                                },
                                {
                                    type: 'image_url',
                                    image_url: {
                                        url: `data:image/jpeg;base64,${imageBase64}`
                                    }
                                }
                            ]
                        }],
                        max_tokens: 10
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const count = data.choices[0].message.content.trim();
                document.getElementById('pillCount').textContent = count;
                document.getElementById('status').textContent = `✅ AI counted ${count} pills`;

            } catch (err) {
                document.getElementById('status').textContent = '❌ Error: ' + err.message;
                console.error(err);
            }
            
            document.getElementById('countBtn').disabled = false;
        }
    </script>
</body>
</html>
